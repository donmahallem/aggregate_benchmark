name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test -v -race ./...
  build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          no-cache: true

  integration:
    name: Integration test (self-test)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image (no cache)
        run: docker build --no-cache -t aggregator-test .

      - name: Seed pages dir with test history
        run: |
          mkdir -p _pages_test
          cp testdata/data.json _pages_test/data.json

      - name: Run aggregator container
        run: |
          docker run --rm \
            -e INPUT_INPUT_DIR=/workspace/testdata \
            -e INPUT_PAGES_DIR=/pages \
            -e GITHUB_SHA=selftest0000000 \
            -v "${{ github.workspace }}/testdata:/workspace/testdata:ro" \
            -v "${{ github.workspace }}/_pages_test:/pages" \
            aggregator-test

      - name: List pages dir
        run: ls -la _pages_test/

      - name: Assert output files exist
        run: python tests/integration/test_output_files.py _pages_test

      - name: Assert data.json structure and content
        run: python tests/integration/test_data_json.py _pages_test selftest0000000 3
