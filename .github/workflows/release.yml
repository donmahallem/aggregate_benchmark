name: Release

# Publishes a multi-platform Docker image to ghcr.io whenever a version tag
# (e.g. v1.2.3 or v1) is pushed.  Callers may reference the pre-built image
# directly as an optimisation:
#
#   uses: docker://ghcr.io/<owner>/<repo>:<tag>
#
# but the default action.yml (using: docker, image: Dockerfile) always works
# without a pre-built image.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write   # needed to push to ghcr.io

jobs:
  release:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
